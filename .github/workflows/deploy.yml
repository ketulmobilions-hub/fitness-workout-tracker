name: Deploy to Render

on:
  push:
    branches: [main]
    paths: ['server/**']

jobs:
  # Inline CI gate — ensures we never deploy broken code.
  # Inlined rather than using workflow_run because workflow_run is unreliable
  # with path-filtered triggers on non-default branches.
  ci:
    name: Backend CI (pre-deploy gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: server

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/fitness_ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: ci          # Only deploy if CI passes
    timeout-minutes: 5

    steps:
      - name: Trigger Render deploy hook
        # Render deploy hooks accept a POST and respond immediately (202).
        # The actual build and deploy happens asynchronously on Render's side.
        # Configure RENDER_DEPLOY_HOOK_URL in: GitHub repo > Settings > Secrets > Actions
        run: |
          curl \
            --silent \
            --show-error \
            --fail \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            -X POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Deploy triggered
        run: echo "Render deploy hook fired successfully. Monitor progress at https://dashboard.render.com"
