name: Flutter CI

on:
  push:
    branches: [main, dev]
    paths: ['app/**']
  pull_request:
    branches: [main, dev]
    paths: ['app/**']

jobs:
  flutter:
    name: Analyze, Test & Build (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # Java 17 required by Android Gradle plugin (compileOptions = VERSION_17)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Flutter pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ runner.os }}-${{ hashFiles('app/pubspec.lock', 'app/packages/fitness_data/pubspec.lock', 'app/packages/fitness_domain/pubspec.lock') }}
          restore-keys: flutter-pub-${{ runner.os }}-

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          channel: stable
          cache: true

      # Resolve packages in dependency order: fitness_data → fitness_domain → app
      - name: flutter pub get — fitness_data
        working-directory: app/packages/fitness_data
        run: flutter pub get

      - name: flutter pub get — fitness_domain
        working-directory: app/packages/fitness_domain
        run: flutter pub get

      - name: flutter pub get — app
        working-directory: app
        run: flutter pub get 

      # Generated files (*.g.dart, *.freezed.dart) are checked in — build_runner not needed in CI
      - name: Flutter analyze
        working-directory: app
        run: flutter analyze --no-fatal-infos

      - name: Flutter test
        working-directory: app
        run: flutter test --reporter=github

      # Debug APK — no signing keystore required
      - name: Build debug APK
        working-directory: app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
