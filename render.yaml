# Render infrastructure-as-code (Blueprint)
# https://render.com/docs/infrastructure-as-code
#
# Connect this repo in the Render dashboard as a Blueprint to provision all
# services (PostgreSQL, Redis, API) automatically. Env vars are wired via
# fromDatabase / fromService — no manual copy-paste required.
#
# ⚠️  FREE TIER EXPIRY: Render's free PostgreSQL is DELETED after 90 days.
#     Upgrade to a paid plan before that deadline or export your data first.
#     See: https://render.com/docs/free#free-postgresql-databases

databases:
  - name: fitness-tracker-db
    databaseName: fitness_tracker
    user: fitness_tracker_user
    region: oregon
    plan: free            # ⚠️  Deleted after 90 days — upgrade for production

services:
  - type: redis
    name: fitness-tracker-redis
    region: oregon
    plan: free
    ipAllowList: []       # Only allow internal Render network access

  - type: web
    name: fitness-tracker-api
    runtime: docker
    region: oregon
    plan: free            # Change to 'starter' or higher for production workloads

    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server

    branch: main
    healthCheckPath: /api/v1/health

    scaling:
      minInstances: 1
      maxInstances: 1     # Free tier supports single instance only

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: fitness-tracker-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          name: fitness-tracker-redis
          type: redis
          property: connectionString

      - key: PORT
        value: 3000

      # Set these manually in the Render dashboard → web service → Environment.
      # sync: false prevents Blueprint re-syncs from overwriting them.
      - key: JWT_SECRET
        sync: false

      - key: CORS_ORIGIN
        sync: false       # e.g. https://your-app.com — defaults to * if unset (insecure in production)
