name: fitness_workout_tracker
description: "Fitness & workout tracker app with custom plans, exercise logging, and progress tracking."
publish_to: 'none'
version: '0.1.0+1'

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Data Classes
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^17.1.0

  # Calendar
  table_calendar: ^3.1.3

  # HTTP
  dio: ^5.9.2
  retrofit: ^4.9.2

  # Connectivity
  connectivity_plus: ^6.1.4

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # OAuth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # Drift (needed for UsersCompanion Value<T> wrapper in repository impl)
  drift: ^2.22.1

  # Charts
  fl_chart: ^0.70.0

  # Local packages
  fitness_data:
    path: packages/fitness_data
  fitness_domain:
    path: packages/fitness_domain
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.12.2
  riverpod_generator: ^4.0.0
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  retrofit_generator: ^10.2.1

  # Linting
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
